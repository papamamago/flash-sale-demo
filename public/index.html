<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 高并发秒杀系统 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 1000px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; padding: 30px 0 10px; font-size: 2rem; color: #ff6b35; }
.subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }

/* 商品卡片 */
.products { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
.product-card { flex: 1; min-width: 250px; background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a; text-align: center; }
.product-card h3 { font-size: 1.3rem; margin-bottom: 8px; }
.product-card .price { font-size: 1.8rem; color: #ff6b35; font-weight: bold; margin: 10px 0; }
.product-card .price::before { content: '¥'; font-size: 1rem; }
.product-card .stock { font-size: 0.9rem; color: #aaa; }
.product-card .stock-num { color: #4ecdc4; font-weight: bold; font-size: 1.2rem; }
.product-card .stock-empty { color: #ff4757; }

/* 控制面板 */
.control-panel { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a4a; }
.control-panel h2 { color: #ff6b35; margin-bottom: 15px; }
.control-row { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.control-row label { min-width: 60px; color: #aaa; }
.control-row input, .control-row select { background: #0f0f23; color: #e0e0e0; border: 1px solid #3a3a5a; padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; }
.control-row input:focus, .control-row select:focus { outline: none; border-color: #ff6b35; }
.control-row input[type="number"] { width: 80px; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: #ff6b35; color: #fff; }
.btn-primary:hover { background: #e85a2a; }
.btn-primary:disabled { background: #555; cursor: not-allowed; }
.btn-danger { background: #ff4757; color: #fff; }
.btn-danger:hover { background: #e04050; }
.btn-secondary { background: #3a3a5a; color: #e0e0e0; }
.btn-secondary:hover { background: #4a4a6a; }

/* 状态条 */
.stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-box { background: #1a1a2e; border-radius: 8px; padding: 15px 20px; flex: 1; min-width: 140px; text-align: center; border: 1px solid #2a2a4a; }
.stat-box .num { font-size: 1.6rem; font-weight: bold; color: #4ecdc4; }
.stat-box .label { font-size: 0.8rem; color: #888; margin-top: 4px; }

/* 日志 */
.log-section { background: #1a1a2e; border-radius: 12px; padding: 20px; border: 1px solid #2a2a4a; }
.log-section h2 { color: #ff6b35; margin-bottom: 10px; }
.log-box { background: #0a0a1a; border-radius: 8px; padding: 12px; height: 300px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.8rem; line-height: 1.6; }
.log-box div { padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
.log-success { color: #4ecdc4; }
.log-fail { color: #ff4757; }
.log-info { color: #888; }
.log-warn { color: #ffa502; }

/* 进度条 */
.progress-bar { height: 8px; background: #2a2a4a; border-radius: 4px; margin: 10px 0; overflow: hidden; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, #ff6b35, #4ecdc4); border-radius: 4px; transition: width 0.3s; width: 0%; }

/* 结果弹窗 */
.result-banner { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border: 2px solid #4ecdc4; border-radius: 16px; padding: 40px; text-align: center; z-index: 100; box-shadow: 0 0 40px rgba(78, 205, 196, 0.3); }
.result-banner.show { display: block; }
.result-banner h2 { font-size: 2.5rem; color: #4ecdc4; margin-bottom: 10px; }
.result-banner p { color: #aaa; margin-bottom: 20px; }
.overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 99; }
.overlay.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>🔥 高并发秒杀系统</h1>
  <p class="subtitle">Node.js + 内存锁 · 模拟真实秒杀场景 · 支持并发压力测试</p>

  <!-- 商品 -->
  <div class="products" id="products"></div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat-box"><div class="num" id="totalOrders">0</div><div class="label">总订单</div></div>
    <div class="stat-box"><div class="num" id="successRate">0%</div><div class="label">成功率</div></div>
    <div class="stat-box"><div class="num" id="totalStock">0</div><div class="label">剩余库存</div></div>
    <div class="stat-box"><div class="num" id="elapsed">0s</div><div class="label">耗时</div></div>
  </div>

  <!-- 控制 -->
  <div class="control-panel">
    <h2>🎮 并发模拟</h2>
    <div class="control-row">
      <label>用户数:</label>
      <input type="number" id="userCount" value="500" min="10" max="10000">
      <label>并发量:</label>
      <input type="number" id="concurrency" value="50" min="1" max="1000">
      <label>目标商品:</label>
      <select id="targetProduct"><option value="iphone-16">iPhone 16 Pro</option><option value="ps5-pro">PS5 Pro</option><option value="nvidia-5090">RTX 5090</option></select>
      <button class="btn btn-primary" id="btnStart" onclick="startFlashSale()">🚀 开始秒杀</button>
      <button class="btn btn-danger" onclick="stopTest()">⏹ 停止</button>
      <button class="btn btn-secondary" onclick="resetAll()">🔄 重置</button>
    </div>
    <div class="progress-bar"><div class="progress-bar-inner" id="progressBar"></div></div>
  </div>

  <!-- 日志 -->
  <div class="log-section">
    <h2>📋 实时日志</h2>
    <div class="log-box" id="logBox"></div>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="overlay" id="overlay"></div>
<div class="result-banner" id="resultBanner">
  <h2 id="resultTitle">🏆 秒杀结束</h2>
  <p id="resultDetail"></p>
  <button class="btn btn-primary" onclick="closeResult()">知道了</button>
</div>

<script>
let running = false;
let stopFlag = false;
let successes = 0;
let fails = 0;
let startTime = 0;

// ===== 加载商品 =====
async function loadProducts() {
  const res = await fetch('/api/products');
  const data = await res.json();
  const container = document.getElementById('products');
  container.innerHTML = '';
  if (!data.data) return;
  for (const [id, p] of Object.entries(data.data)) {
    const empty = p.remaining <= 0;
    container.innerHTML += `
      <div class="product-card">
        <h3>${p.name}</h3>
        <div class="price">${p.price}</div>
        <div class="stock">剩余: <span class="stock-num ${empty ? 'stock-empty' : ''}" id="stock-${id}">${p.remaining}</span> / ${p.stock}</div>
      </div>`;
  }
  updateStats(data.data);
}

// ===== 刷新库存 =====
async function refreshStock() {
  const res = await fetch('/api/products');
  const data = await res.json();
  if (!data.data) return;
  for (const [id, p] of Object.entries(data.data)) {
    const el = document.getElementById(`stock-${id}`);
    if (el) {
      el.textContent = p.remaining;
      el.className = `stock-num ${p.remaining <= 0 ? 'stock-empty' : ''}`;
    }
  }
  updateStats(data.data);
}

// ===== 统计 =====
function updateStats(data) {
  let totalStock = 0;
  for (const p of Object.values(data)) totalStock += p.remaining;
  document.getElementById('totalStock').textContent = totalStock;
  document.getElementById('totalOrders').textContent = successes;
  const rate = (successes + fails) > 0 ? ((successes / (successes + fails)) * 100).toFixed(1) : 0;
  document.getElementById('successRate').textContent = rate + '%';
  if (startTime > 0) {
    document.getElementById('elapsed').textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }
}

// ===== 日志 =====
function addLog(msg, type = 'info') {
  const box = document.getElementById('logBox');
  const div = document.createElement('div');
  div.className = `log-${type}`;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ===== 秒杀核心 =====
async function flashBuy(userId, productId) {
  const res = await fetch('/api/flash-buy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId, productId, quantity: 1 }),
  });
  const data = await res.json();
  return data;
}

// ===== 并发模拟 =====
async function startFlashSale() {
  if (running) return;
  running = true;
  stopFlag = false;
  successes = 0;
  fails = 0;
  startTime = Date.now();

  const userCount = parseInt(document.getElementById('userCount').value);
  const concurrency = parseInt(document.getElementById('concurrency').value);
  const productId = document.getElementById('targetProduct').value;

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStart').textContent = '⏳ 秒杀中...';
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('progressBar').style.width = '0%';

  addLog(`🚀 启动秒杀: ${userCount}用户, 并发${concurrency}, 商品:${productId}`, 'warn');
  addLog(`📦 开始抢购...`, 'info');

  // 生成用户池
  const users = Array.from({ length: userCount }, (_, i) => `user_${String(i+1).padStart(4,'0')}`);

  // 分批并发
  const batchSize = concurrency;
  let done = 0;

  for (let i = 0; i < users.length; i += batchSize) {
    if (stopFlag) break;
    const batch = users.slice(i, i + batchSize);
    const promises = batch.map(uid => flashBuy(uid, productId));
    const results = await Promise.allSettled(promises);

    for (const r of results) {
      if (r.status === 'fulfilled' && r.value.code === 0) {
        successes++;
        addLog(`✅ ${r.value.data.userId} → ${r.value.data.productName} (${r.value.data.orderId})`, 'success');
      } else {
        fails++;
        if (r.status === 'fulfilled') {
          if (r.value.code !== 429) { // 跳过重复下单日志
            addLog(`❌ ${(fails <= 10) ? r.value.msg : ''}`, 'fail');
          }
        }
      }
    }

    done = Math.min(i + batchSize, users.length);
    const pct = Math.round((done / users.length) * 100);
    document.getElementById('progressBar').style.width = pct + '%';

    // 每批刷新库存
    if (done % (batchSize * 5) === 0) await refreshStock();
  }

  await refreshStock();
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

  // 汇总
  const total = successes + fails;
  const rate = total > 0 ? ((successes / total) * 100).toFixed(1) : 0;
  addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'warn');
  addLog(`🏁 秒杀结束！耗时 ${elapsed}s`, 'warn');
  addLog(`📊 总请求: ${total} | 成功: ${successes} | 失败: ${fails} | 成功率: ${rate}%`, 'warn');

  // 弹窗
  document.getElementById('resultTitle').textContent = successes > 0 ? '🏆 秒杀结束' : '💔 全军覆没';
  document.getElementById('resultDetail').textContent =
    `总请求 ${total} 次 | 成功 ${successes} 单 | 成功率 ${rate}% | 耗时 ${elapsed}s`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('resultBanner').classList.add('show');

  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStart').textContent = '🚀 开始秒杀';
  running = false;
}

function stopTest() {
  stopFlag = true;
  addLog('⏹ 已手动停止', 'warn');
}

async function resetAll() {
  if (running) { stopTest(); await new Promise(r => setTimeout(r, 500)); }
  await fetch('/api/reset', { method: 'POST' });
  document.getElementById('logBox').innerHTML = '';
  successes = 0; fails = 0; startTime = 0;
  await loadProducts();
  document.getElementById('totalOrders').textContent = '0';
  document.getElementById('successRate').textContent = '0%';
  document.getElementById('elapsed').textContent = '0s';
  document.getElementById('progressBar').style.width = '0%';
  addLog('🔄 系统已重置', 'info');
}

function closeResult() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('resultBanner').classList.remove('show');
}

// ===== 初始化 =====
loadProducts();
addLog('💡 系统就绪，点击"开始秒杀"进行并发测试', 'info');
</script>
</body>
</html>
